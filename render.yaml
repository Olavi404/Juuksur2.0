services:
  - type: web
    name: juuksur-app
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_NAME
        value: Juuksur2.0
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: warning
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: juuksur-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: juuksur-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: juuksur-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: juuksur-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: juuksur-db
          property: password
      - key: SESSION_DRIVER
        value: cookie
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync

databases:
  - name: juuksur-db
    plan: free
